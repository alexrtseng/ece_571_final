data_dir: ./data/multi_node
raw_da_dir: ./pjm_lmps_da
raw_rt_dir: ./pjm_lmps

# ── Train/val/test split (inclusive, YYYY-MM) ─────────────────────────────────
train_end: "2023-12"
val_end: "2024-12"

# ── Model ─────────────────────────────────────────────────────────────────────
base_channels: 64
num_res_blocks: 2
attn_heads: 8

# ── Diffusion ─────────────────────────────────────────────────────────────────
T: 1000
schedule: cosine
ddim_steps: 50

# ── Training ──────────────────────────────────────────────────────────────────
epochs: 300
batch_size: 64
lr: 1.0e-4
lr_warmup_steps: 500
grad_clip: 1.0
mixed_precision: true
patience: 40

# ── Calendar conditioning ──────────────────────────────────────────────────────
use_calendar: false

# ── Output ────────────────────────────────────────────────────────────────────
out_dir: ./runs/multi_node
save_every: 10
